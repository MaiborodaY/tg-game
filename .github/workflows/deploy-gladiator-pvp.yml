name: Deploy Gladiator PvP Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gladiator-pvp-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck PvP Worker
        run: npx tsc --noEmit --project workers/gladiator-pvp/tsconfig.json

      - name: Deploy PvP Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config workers/gladiator-pvp/wrangler.jsonc
