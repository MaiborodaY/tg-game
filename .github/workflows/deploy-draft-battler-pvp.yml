name: Deploy Draft Battler App Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-draft-battler-pvp.yml"
      - "draft-battler/**"
      - "workers/draft-battler-pvp/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
  workflow_dispatch:

concurrency:
  group: draft-battler-app-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy App Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Draft Battler frontend
        run: npm run draft-battler:typecheck

      - name: Build Draft Battler frontend
        run: npm run draft-battler:build

      - name: Typecheck Draft Battler PvP Worker
        run: npm run draft-battler:pvp:typecheck

      - name: Deploy Draft Battler App Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config workers/draft-battler-pvp/wrangler.jsonc
