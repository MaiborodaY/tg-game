<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dust Arena - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section id="mainMenu" class="main-menu" aria-label="Dust Arena main menu">
        <h1 class="menu-title">Dust Arena</h1>
        <div class="city-menu">
          <div id="cityHero" class="city-menu__hero" aria-hidden="true"></div>
          <div class="city-menu__curtain" aria-hidden="true"></div>
          <div id="heroWidget" class="city-menu__hero-widget">
            <button id="heroPortraitButton" class="city-menu__portrait-button" type="button" aria-label="Character">
              <div id="heroPortrait" class="city-menu__portrait" aria-hidden="true"></div>
            </button>
            <div class="city-menu__hero-info" aria-live="polite">
              <div class="city-menu__hero-info-top">
                <strong id="heroInfoName" class="city-menu__hero-name"></strong>
                <span id="heroInfoGold" class="city-menu__hero-gold"></span>
              </div>
              <div id="heroInfoLevel" class="city-menu__hero-level"></div>
              <div class="city-menu__hero-xp">
                <div class="city-menu__hero-xp-track" aria-hidden="true">
                  <div id="heroInfoXpFill" class="city-menu__hero-xp-fill"></div>
                </div>
                <span id="heroInfoXpText" class="city-menu__hero-xp-text"></span>
              </div>
            </div>
          </div>
          <nav class="city-menu__nav" aria-label="City locations">
            <button id="startButton" class="city-menu__button" type="button">
              <span class="city-menu__icon city-menu__icon--arena" aria-hidden="true"></span>
              <span>Arena</span>
            </button>
            <button id="weaponShopButton" class="city-menu__button" type="button">
              <span class="city-menu__icon city-menu__icon--smith" aria-hidden="true"></span>
              <span>Smith</span>
            </button>
            <button id="armoryButton" class="city-menu__button" type="button">
              <span class="city-menu__icon city-menu__icon--armorer" aria-hidden="true"></span>
              <span>Armorer</span>
            </button>
            <button class="city-menu__button" type="button" disabled>
              <span class="city-menu__icon city-menu__icon--magic-shop" aria-hidden="true"></span>
              <span>Magic Shop</span>
            </button>
            <button class="city-menu__button" type="button" disabled>
              <span class="city-menu__icon city-menu__icon--church" aria-hidden="true"></span>
              <span>Church</span>
            </button>
          </nav>
        </div>
      </section>

      <section id="gameScreen" class="game-screen battle-screen" hidden>
        <section class="status-strip" aria-label="Arena range">
          <div class="distance-ribbon">
            <span>Distance</span>
            <strong id="distanceText">Far</strong>
          </div>
        </section>

        <div class="settings-menu" data-settings-menu>
          <button
            id="arenaSettingsButton"
            class="settings-menu__button"
            type="button"
            aria-label="Settings"
            aria-expanded="false"
            aria-controls="arenaSettingsPanel"
            data-settings-button
          >
            <span aria-hidden="true">&#9881;</span>
          </button>
          <section id="arenaSettingsPanel" class="settings-menu__panel" aria-label="Settings" hidden data-settings-panel>
            <h2>Settings</h2>
            <fieldset class="settings-menu__group">
              <legend>Animation</legend>
              <label class="settings-menu__option">
                <input type="radio" name="arenaAnimation" value="normal" data-setting-animation />
                <span>Normal</span>
              </label>
              <label class="settings-menu__option">
                <input type="radio" name="arenaAnimation" value="half" data-setting-animation />
                <span>Half</span>
              </label>
              <label class="settings-menu__option">
                <input type="radio" name="arenaAnimation" value="off" data-setting-animation />
                <span>Off</span>
              </label>
            </fieldset>
            <label class="settings-menu__toggle">
              <input type="checkbox" data-setting-vfx />
              <span>VFX</span>
            </label>
            <label class="settings-menu__toggle">
              <input type="checkbox" data-setting-low-effects />
              <span>Low effects</span>
            </label>
            <label class="settings-menu__toggle">
              <input type="checkbox" data-setting-fps />
              <span>Show FPS</span>
            </label>
          </section>
        </div>
        <output class="fps-counter" aria-label="FPS" hidden data-fps-counter>FPS --</output>

        <section class="stage-panel">
          <div id="game" class="game-frame" aria-label="Gladiator arena canvas"></div>
          <div class="battle-ui" aria-label="Battle overlay">
            <button id="restartButton" class="restart stage-restart" type="button">Restart</button>
            <section class="fighters-strip arena-fighters-strip flask-hud" aria-label="Fighter stats">
              <div class="fighter-flasks player-flasks">
                <div class="flask-row" aria-label="Borshemir resources">
                  <div class="resource-flask flask--stamina" aria-label="Borshemir stamina">
                    <div id="playerStaFill" class="flask-fill stamina-fill"></div>
                    <span id="playerStaText" class="flask-value">10/10</span>
                    <small>Energy</small>
                  </div>
                  <div class="resource-flask flask--armor" aria-label="Borshemir armor">
                    <div id="playerArmorFill" class="flask-fill armor-fill"></div>
                    <span id="playerArmorText" class="flask-value">0/0</span>
                    <small>Armor</small>
                  </div>
                  <div class="resource-flask flask--hp" aria-label="Borshemir health">
                    <div id="playerHpFill" class="flask-fill hp-fill"></div>
                    <span id="playerHpText" class="flask-value">30/30</span>
                    <small>Health</small>
                  </div>
                </div>
                <strong class="fighter-name">Borshemir</strong>
              </div>

              <div class="fighter-flasks enemy-flasks">
                <div class="flask-row" aria-label="Grumbus resources">
                  <div class="resource-flask flask--hp" aria-label="Grumbus health">
                    <div id="enemyHpFill" class="flask-fill hp-fill"></div>
                    <span id="enemyHpText" class="flask-value">30/30</span>
                    <small>Health</small>
                  </div>
                  <div class="resource-flask flask--armor" aria-label="Grumbus armor">
                    <div id="enemyArmorFill" class="flask-fill armor-fill"></div>
                    <span id="enemyArmorText" class="flask-value">0/0</span>
                    <small>Armor</small>
                  </div>
                  <div class="resource-flask flask--stamina" aria-label="Grumbus stamina">
                    <div id="enemyStaFill" class="flask-fill stamina-fill"></div>
                    <span id="enemyStaText" class="flask-value">10/10</span>
                    <small>Energy</small>
                  </div>
                </div>
                <strong class="fighter-name">Grumbus</strong>
              </div>
            </section>
          </div>
          <div id="resultBanner" class="result-banner" hidden></div>
          <button id="cityButton" class="restart city-return" type="button" hidden>Back to City</button>
        </section>

        <section class="combat-toast" aria-label="Fight log">
          <div id="log" class="log" aria-live="polite"></div>
        </section>

      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
