<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dust Arena - Debug Tuning</title>
  </head>
  <body class="arena-active debug-active">
    <main class="debug-app">
      <div class="debug-game-shell shell">
        <section id="mainMenu" class="main-menu" aria-label="Dust Arena debug boot" hidden>
          <button id="startButton" class="restart start-button" type="button">Start debug</button>
        </section>

        <section id="gameScreen" class="game-screen battle-screen" aria-label="Dust Arena debug preview">
          <img class="stage-bg" src="./assets/arena/arena-bg-01.png" alt="" aria-hidden="true" />

          <section class="top-hud" aria-label="Arena summary">
            <div class="score-card">
              <span>Score</span>
              <strong id="score">0</strong>
              <small id="statusText">Round 1 / 12</small>
            </div>
          </section>

          <section class="status-strip" aria-label="Turn and range">
            <div id="turnBadge" class="turn-badge">Your turn</div>
            <div class="distance-ribbon">
              <span>Distance</span>
              <strong id="distanceText">Far</strong>
            </div>
          </section>

          <section class="stage-panel">
            <div id="game" class="game-frame" aria-label="Gladiator arena canvas"></div>
            <div class="battle-ui" aria-label="Battle overlay">
              <button id="restartButton" class="restart stage-restart" type="button">Restart</button>
              <section class="fighters-strip arena-fighters-strip flask-hud" aria-label="Fighter stats">
              <div class="fighter-flasks player-flasks">
                <div class="flask-row" aria-label="Borshemir resources">
                  <div class="resource-flask flask--stamina" aria-label="Borshemir stamina">
                    <div id="playerStaFill" class="flask-fill stamina-fill"></div>
                    <span id="playerStaText" class="flask-value">10/10</span>
                    <small>Energy</small>
                  </div>
                  <div class="resource-flask flask--hp" aria-label="Borshemir health">
                    <div id="playerHpFill" class="flask-fill hp-fill"></div>
                    <span id="playerHpText" class="flask-value">30/30</span>
                    <small>Health</small>
                  </div>
                </div>
                <strong class="fighter-name">Borshemir</strong>
              </div>

              <div class="fighter-flasks enemy-flasks">
                <div class="flask-row" aria-label="Grumbus resources">
                  <div class="resource-flask flask--hp" aria-label="Grumbus health">
                    <div id="enemyHpFill" class="flask-fill hp-fill"></div>
                    <span id="enemyHpText" class="flask-value">30/30</span>
                    <small>Health</small>
                  </div>
                  <div class="resource-flask flask--stamina" aria-label="Grumbus stamina">
                    <div id="enemyStaFill" class="flask-fill stamina-fill"></div>
                    <span id="enemyStaText" class="flask-value">10/10</span>
                    <small>Energy</small>
                  </div>
                </div>
                <strong class="fighter-name">Grumbus</strong>
              </div>
            </section>
            </div>
            <div id="resultBanner" class="result-banner" hidden></div>
            <button id="cityButton" class="restart city-return" type="button" hidden>Back to City</button>
          </section>

          <section class="combat-toast" aria-label="Fight log">
            <div id="log" class="log" aria-live="polite"></div>
          </section>
        </section>
      </div>

      <aside id="debugPanelHost" class="debug-app-panel" aria-label="Debug tuning controls">
        <header>
          <p class="eyebrow">Dust Arena</p>
          <h1>Tuning</h1>
          <p>Adjust the preview, then copy stable values back into layout defaults later.</p>
        </header>
      </aside>
    </main>

    <script type="module" src="/src/debugMain.ts"></script>
  </body>
</html>
