<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dust Arena - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" crossorigin src="./assets/index-BiS0TFal.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-ChKif-oc.css">
  </head>
  <body>
    <main class="shell">
      <section id="mainMenu" class="main-menu" aria-label="Dust Arena main menu">
        <div class="menu-card">
          <p class="eyebrow">Telegram Mini App</p>
          <h1>Dust Arena</h1>
          <p class="subtitle">
            A slapstick turn-based gladiator toy with stamina, risky choices, and very questionable helmets.
          </p>
          <button id="startButton" class="restart start-button" type="button">Start fight</button>
        </div>
      </section>

      <section id="gameScreen" class="game-screen battle-screen" hidden>
        <img class="stage-bg" src="./assets/arena/arena-bg-01.png" alt="" aria-hidden="true" />

        <section class="top-hud" aria-label="Arena summary">
          <div class="score-card">
            <span>Score</span>
            <strong id="score">0</strong>
            <small id="statusText">Round 1 / 12</small>
          </div>
        </section>


        <section class="status-strip" aria-label="Turn and range">
          <div id="turnBadge" class="turn-badge">Your turn</div>
          <div class="distance-ribbon">
            <span>Distance</span>
            <strong id="distanceText">Far</strong>
          </div>
        </section>

        <section class="stage-panel">
          <div id="game" class="game-frame" aria-label="Gladiator arena canvas"></div>
          <div class="battle-ui" aria-label="Battle overlay">
            <button id="restartButton" class="restart stage-restart" type="button">Restart</button>
            <section class="fighters-strip arena-fighters-strip" aria-label="Fighter stats">
              <div class="combat-plate player-plate">
                <strong>Borshemir</strong>
                <span id="playerHpText">HP 30/30</span>
                <div class="stat-track"><div id="playerHpFill" class="stat-fill hp-fill"></div></div>
                <span id="playerStaText">STA 10/10</span>
                <div class="stat-track"><div id="playerStaFill" class="stat-fill stamina-fill"></div></div>
              </div>

              <div class="combat-plate enemy-plate">
                <strong>Grumbus</strong>
                <span id="enemyHpText">HP 30/30</span>
                <div class="stat-track"><div id="enemyHpFill" class="stat-fill hp-fill"></div></div>
                <span id="enemyStaText">STA 10/10</span>
                <div class="stat-track"><div id="enemyStaFill" class="stat-fill stamina-fill"></div></div>
              </div>
            </section>
          </div>
          <div id="resultBanner" class="result-banner" hidden></div>
        </section>

        <section class="combat-toast" aria-label="Fight log">
          <div id="log" class="log" aria-live="polite"></div>
        </section>

      </section>
    </main>

  </body>
</html>
