<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>TG TD • Enemies Atlas</title>
  <style>
    html,body{margin:0;background:#0b0f0e;color:#fff;font-family:system-ui,Segoe UI,Arial}
    /* HUD снизу по центру */
    #hud{
      position:fixed; left:0; right:0; bottom:8px;
      display:flex; gap:12px; align-items:center; justify-content:center;
      z-index:10; flex-wrap:wrap; pointer-events:auto;
    }
    .pill{background:#11161a;border:1px solid #2b3941;border-radius:10px;padding:6px 10px}
    .btn{cursor:pointer;user-select:none}
    .btn.sel{outline:2px solid #7cf7d4}
    canvas{touch-action:manipulation}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="hud">
    <div class="pill">💰 <span id="gold">100</span></div>
    <div class="pill">❤️ <span id="hp">20</span></div>
    <div class="pill">🌊 <span id="wave">0</span></div>

    <div id="start" class="pill btn">▶️ Start</div>
    <div id="sell"  class="pill btn">💱 Sell</div>

    <div id="t-archer" class="pill btn sel">🏹 Archer (50)</div>
    <div id="t-mage"   class="pill btn">🔥 Mage (75)</div>
  </div>

<script>
(() => {
  const CELL=40, COLS=9, ROWS=16, W=COLS*CELL, H=ROWS*CELL;

  const game=new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H, backgroundColor:'#0b0f0e',
    pixelArt:false, antialias:true,
    scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
    physics:{default:'arcade',arcade:{debug:false}},
    scene:{preload,create,update}
  });

  // --- state ---
  let grid, pathPts=[];
  let enemies, bullets;
  let towers=[], selectedTower=null;
  let gold=100, hp=20, wave=0, running=false, spawning=false;

  // ===== Баланс =====
  const FIREBALL_SPEED   = 270;
  const SPLASH_R         = 60;
  const SPLASH_MIN_PCT   = 0.45;
  const BURN_DPS         = 4;
  const BURN_DURATION    = 1600;
  const BURN_TICK_MS     = 200;

  const TOWER_TYPES = {
    ARCHER: { key:'ARCHER', cost:50, range:CELL*3.2, rate:360, dmg:10, proj:'arrow' },
    MAGE:   { key:'MAGE',   cost:75, range:CELL*3.2, rate:650, dmg:16, proj:'fireball' }
  };
  let currentType = TOWER_TYPES.ARCHER;

  const ENEMY_TYPES = {
    SLIME:  { key:'slime',  size:20, speed: 46, hpMul:1.00, gold:5 },
    GOBLIN: { key:'goblin', size:20, speed: 70, hpMul:0.85, gold:6 },
    BEETLE: { key:'beetle', size:22, speed: 40, hpMul:1.60, gold:8 },
  };

  // HUD
  const goldEl=document.getElementById('gold');
  const hpEl=document.getElementById('hp');
  const waveEl=document.getElementById('wave');
  const startBtn=document.getElementById('start');
  const sellBtn=document.getElementById('sell');
  const archerBtn=document.getElementById('t-archer');
  const mageBtn=document.getElementById('t-mage');

  startBtn.onclick=()=>{ if(!running){running=true; nextWave();} else if(!spawning){ nextWave(); } };
  sellBtn.onclick=()=>{ if(selectedTower) sellTower(selectedTower); };
  archerBtn.onclick=()=>{ currentType=TOWER_TYPES.ARCHER; archerBtn.classList.add('sel'); mageBtn.classList.remove('sel'); };
  mageBtn.onclick  =()=>{ currentType=TOWER_TYPES.MAGE;   mageBtn.classList.add('sel');   archerBtn.classList.remove('sel'); };

  // ===== helpers =====
  function safeRemove(scene,key){ if(scene.textures.exists(key)) scene.textures.remove(key); }
  function hasFrame(atlasKey, frameKey, scene){
    try { return scene.textures.exists(atlasKey) && !!scene.textures.get(atlasKey).get(frameKey); }
    catch { return false; }
  }

  // ===== ASSETS =====
  function preload(){
    // Атласы башен/юнитов (как было)
    this.load.atlas('towers1',     './assets/atlas_towers_single.webp', './assets/atlas_towers_single.json');
    this.load.atlas('atlas_units', './assets/atlas_units.webp',         './assets/atlas_units.json');
    // НОВОЕ: отдельный атлас врагов
    this.load.atlas('atlas_enemies','./assets/atlas_enemies.webp',      './assets/atlas_enemies.json');

    // Процедурный фон (зелёная карта)
    makeCell(this,'cell_grass',0x14271e,0x0e2017,0x1a3527);
    makeCell(this,'cell_path',  0x294432,0x223a2a,0x3a6448);
    makeNoise(this,'noise64');
    makeRadial(this,'grad256',256,0x183126,0x0a1410);
    makeVignette(this,'vign256',256);

    // мелочи
    safeRemove(this,'dot8'); { const g=this.make.graphics({x:0,y:0,add:false}); g.fillStyle(0xffffff,1); g.fillCircle(4,4,4); g.generateTexture('dot8',8,8); }

    // фолбэки на стрелу/фаербол если их нет в atlas_units
    if(!hasFrame('atlas_units','arrow',this)){
      safeRemove(this,'arrow'); const a=this.make.graphics({x:0,y:0,add:false});
      a.fillStyle(0xc7a865,1); a.fillRect(4,3,20,2);
      a.fillStyle(0xffffff,1); a.fillTriangle(24,2,32,4,24,6);
      a.fillStyle(0xdac07a,1); a.fillRect(0,2,4,4);
      a.generateTexture('arrow',32,8);
    }
    if(!hasFrame('atlas_units','fireball_core',this)){
      safeRemove(this,'fireball'); const f=this.make.graphics({x:0,y:0,add:false});
      f.fillStyle(0xff7a59,1); f.fillCircle(6,6,5);
      f.fillStyle(0xffb38f,0.9); f.fillCircle(6,6,3);
      f.generateTexture('fireball',12,12);
    }

    // Процедурные фолбэки врагов (на случай, если atlas_enemies ещё не залит)
    safeRemove(this,'enemy_slime'); const ES=this.make.graphics({x:0,y:0,add:false});
    ES.fillStyle(0x64d69a,1); ES.fillEllipse(16,16,22,20); ES.fillStyle(0x3aa374,1); ES.fillEllipse(16,17,14,12);
    ES.generateTexture('enemy_slime',32,32);

    safeRemove(this,'enemy_goblin'); const EG=this.make.graphics({x:0,y:0,add:false});
    EG.fillStyle(0x6dc16d,1); EG.fillRoundedRect(8,8,16,16,6);
    EG.fillStyle(0x4e9a4e,1); EG.fillRoundedRect(10,12,12,8,5);
    EG.generateTexture('enemy_goblin',32,32);

    safeRemove(this,'enemy_beetle'); const EB=this.make.graphics({x:0,y:0,add:false});
    EB.fillStyle(0x4a3d33,1); EB.fillEllipse(16,16,20,16);
    EB.fillStyle(0x3a2f27,1); EB.fillEllipse(16,16,18,14);
    EB.generateTexture('enemy_beetle',32,32);
  }

  // === PROC BG ===
  function makeCell(scene,key,base,mid,hi){
    const g=scene.make.graphics({x:0,y:0,add:false});
    g.fillStyle(base,1); g.fillRect(0,0,CELL,CELL);
    g.lineStyle(1,mid,1); g.beginPath(); g.moveTo(0, CELL*0.5); g.lineTo(CELL, CELL*0.5); g.strokePath();
    g.lineStyle(1,0x0b160f,0.4); g.beginPath(); g.moveTo(CELL*0.5,0); g.lineTo(CELL*0.5,CELL); g.strokePath();
    for(let i=0;i<3;i++){ const x=4+Math.random()*(CELL-8), y=4+Math.random()*(CELL-8), r=4+Math.random()*6; g.fillStyle(hi,0.12); g.fillCircle(x,y,r); }
    g.generateTexture(key,CELL,CELL); g.destroy();
  }
  function makeNoise(scene,key){
    const s=64, g=scene.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xffffff,0); g.fillRect(0,0,s,s);
    for(let i=0;i<600;i++){ const a=0.03+Math.random()*0.05; g.fillStyle(0xffffff,a); g.fillRect(Math.random()*s, Math.random()*s, 1, 1); }
    g.generateTexture(key,s,s); g.destroy();
  }
  function makeRadial(scene,key,sz,centerCol,edgeCol){
    const g=scene.make.graphics({x:0,y:0,add:false});
    for(let i=0;i<32;i++){
      const t=i/31;
      const col=Phaser.Display.Color.Interpolate.ColorWithColor(
        Phaser.Display.Color.ValueToColor(centerCol),
        Phaser.Display.Color.ValueToColor(edgeCol),
        31,i);
      const c=Phaser.Display.Color.GetColor(col.r,col.g,col.b);
      g.fillStyle(c, 1 - t*0.15);
      const m=Math.round(t*sz*0.45);
      g.fillRect(m,m,sz-2*m,sz-2*m);
    }
    g.generateTexture(key,sz,sz); g.destroy();
  }
  function makeVignette(scene,key,sz){
    const g=scene.make.graphics({x:0,y:0,add:false});
    for(let i=0;i<24;i++){ const t=i/23; const a=0.04+0.03*t; g.lineStyle(8,0x000000,a); const m=4+i*4; g.strokeRect(m,m,sz-2*m,sz-2*m); }
    g.generateTexture(key,sz,sz); g.destroy();
  }

  // ===== CREATE =====
  function create(){
    const s=this;

    // сетка + путь
    grid=Array.from({length:ROWS}, _=> Array.from({length:COLS}, _=> 0));
    const LEFT=1, RIGHT=COLS-2; let dir=1;
    function markPath(r,c){ grid[r][c]=1; pathPts.push({r,c,x:c*CELL+CELL/2,y:r*CELL+CELL/2}); }
    for(let r=0;r<ROWS-1;r+=2){
      if(dir===1){ for(let c=LEFT;c<=RIGHT;c++) markPath(r,c); markPath(r+1,RIGHT); }
      else       { for(let c=RIGHT;c>=LEFT;c--) markPath(r,c); markPath(r+1,LEFT); }
      dir*=-1;
    }

    // фон
    s.add.image(W/2,H/2,'grad256').setDisplaySize(W,H).setDepth(-10);
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const isPath = grid[r][c]===1;
        s.add.image(c*CELL+CELL/2, r*CELL+CELL/2, isPath?'cell_path':'cell_grass').setDepth(-9);
      }
    }
    s.add.tileSprite(W/2,H/2,W,H,'noise64').setAlpha(0.07).setDepth(-8);
    s.add.image(W/2,H/2,'vign256').setDisplaySize(W,H).setAlpha(0.55).setDepth(9);

    // группы
    enemies = s.physics.add.group({ classType: Phaser.Physics.Arcade.Image, runChildUpdate:false });
    bullets = s.physics.add.group({ classType: Phaser.Physics.Arcade.Image, runChildUpdate:false });

    // попадания
    s.physics.add.overlap(bullets, enemies, (b,e)=>{
      if(!b.active || !e.active) return;

      // анти-оверлап в дуле
      if (b.birthTime != null) {
        const now = s.time.now;
        const dx = (b.x - (b.startX ?? b.x)), dy = (b.y - (b.startY ?? b.y));
        if (now - b.birthTime < 110 || (dx*dx+dy*dy) < 8*8) return;
      }

      // fireball → взрыв
      if ((b.texture?.key === 'atlas_units' && b.frame?.name === 'fireball_core') ||
          (b.texture?.key === 'fireball')) {
        explodeSplash(s, b.x, b.y, b.dmg, SPLASH_R);
        cleanupProjectile(b);
        return;
      }

      // стрела
      e.hp -= b.dmg; stopTrail(b); b.destroy();
      if(e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
    });

    // ввод
    s.input.on('pointerdown', (p)=>{
      const w=p.positionToCamera(s.cameras.main);
      const c=Math.floor(w.x/CELL), r=Math.floor(w.y/CELL);
      if(c<0||r<0||c>=COLS||r>=ROWS) return;
      const isTower=towers.find(t=>t.c===c&&t.r===r);
      if(isTower){ selectTower(isTower); return; }
      if(grid[r][c]===0) placeTower(s,r,c, currentType);
    });

    // тик поджога
    s.time.addEvent({ delay: BURN_TICK_MS, loop: true, callback: ()=>applyBurnTick(s) });

    updateHud();
  }

  function update(time,dt){
    for(const t of towers){
      t.cd-=dt;
      if(t.cd<=0){
        const e = acquireTarget(t);
        if(e){ shoot(this,t,e); t.cd=t.rate; } else { t.cd=100; }
      }
      if(t.sprite){
        const aim = acquireTarget(t);
        if(aim){
          const ang = Phaser.Math.Angle.Between(t.x, t.y, aim.x, aim.y);
          t.sprite.rotation = Phaser.Math.Angle.RotateTo(t.sprite.rotation||0, ang, 0.15);
        }
      }
    }
    if(running && !spawning && enemies.countActive(true)===0){
      running=false; document.getElementById('start').textContent='▶️ Next';
    }
  }

  // --- towers (один спрайт) ---
  function placeTower(scene,r,c,type){
    const cost=type.cost; if(gold<cost) return;
    gold-=cost; updateHud();
    return placeTowerInternal(scene,r,c,type);
  }
  function placeTowerInternal(scene,r,c,type){
    const x=c*CELL+CELL/2,y=r*CELL+CELL/2;
    const frame = (type.key==='ARCHER') ? 'archer_tower' : 'mage_tower';
    const sprite = scene.add.sprite(x, y, 'towers1', frame)
      .setOrigin(0.5, 0.72).setScale(0.32).setDepth(4);

    const ring=scene.add.graphics().setDepth(2);
    ring.lineStyle(1, 0xffffff, 0.25).strokeCircle(x,y,type.range);

    const t={ type:type.key, proj:type.proj, r,c,x,y, sprite, ring,
              range:type.range, rate:type.rate, cd:200, dmg:type.dmg };
    towers.push(t); grid[r][c]=2; selectTower(t);
    return t;
  }

  function selectTower(t){
    if(selectedTower && selectedTower.ring)
      selectedTower.ring.clear().strokeCircle(selectedTower.x,selectedTower.y,selectedTower.range);
    selectedTower=t;
  }

  function sellTower(t){
    const cfg = TOWER_TYPES[t.type] || TOWER_TYPES.ARCHER;
    gold += Math.floor((cfg.cost||50)*0.5); updateHud();
    if(t.sprite) t.sprite.destroy();
    t.ring.destroy();
    towers=towers.filter(x=>x!==t); grid[t.r][t.c]=0; selectedTower=null;
  }

  function acquireTarget(t){
    const arr=enemies.getChildren();
    let best=null, bestD2=Infinity;
    for(let i=0;i<arr.length;i++){
      const e=arr[i]; if(!e||!e.active) continue;
      const dx=e.x-t.x, dy=e.y-t.y, d2=dx*dx+dy*dy;
      if(d2<=t.range*t.range && d2<bestD2){ bestD2=d2; best=e; }
    }
    return best;
  }

  // --- выстрелы ---
  function shoot(scene,t,e){
    const a = Phaser.Math.Angle.Between(t.x, t.y, e.x, e.y);
    if(t.sprite){ t.sprite.rotation = a; }

    const MUZZLE = (t.type==='ARCHER') ? 18 : 16;
    const mx = t.x + Math.cos(a)*MUZZLE;
    const my = t.y + Math.sin(a)*MUZZLE;

    if (t.proj === 'fireball') {
      const useAtlas = hasFrame('atlas_units','fireball_core',scene);
      const fb = scene.physics.add.image(mx, my,
        useAtlas? 'atlas_units':'fireball', useAtlas? 'fireball_core':undefined
      ).setDepth(6).setRotation(a);
      fb.dmg = t.dmg; bullets.add(fb);
      fb.birthTime = scene.time.now; fb.startX = mx; fb.startY = my;

      if (hasFrame('atlas_units','glow_soft',scene)) {
        const glow = scene.add.image(mx, my, 'atlas_units', 'glow_soft').setDepth(5).setAlpha(0.9);
        fb.__glow = glow;
        fb.__glowFollow = scene.time.addEvent({ delay:16, loop:true, callback: ()=>{
          if(!fb.active){ glow.destroy(); return; } glow.x=fb.x; glow.y=fb.y;
        }});
        scene.tweens.add({ targets: glow, alpha:0.4, yoyo:true, duration:450, repeat:-1 });
      } else {
        fb.__trailEv = attachTrail(scene, fb, 0xffb38f, 0.8, 1.0, 0.5, 300);
      }

      const dx=e.x - mx, dy=e.y - my, L = Math.hypot(dx,dy)||1;
      fb.setVelocity((dx/L)*FIREBALL_SPEED,(dy/L)*FIREBALL_SPEED);
      const ttl = Math.ceil((L / FIREBALL_SPEED) * 1000) + 500;
      scene.time.delayedCall(ttl, ()=> cleanupProjectile(fb));
      return;
    }

    // Стрела
    const ARROW_SPEED = 340;
    const useArrowAtlas = hasFrame('atlas_units','arrow',scene);
    const arrow = scene.physics.add.image(mx, my,
      useArrowAtlas? 'atlas_units':'arrow', useArrowAtlas? 'arrow':undefined
    ).setOrigin(0.2,0.5).setRotation(a).setDepth(6);
    arrow.dmg = t.dmg; bullets.add(arrow);
    arrow.birthTime = scene.time.now; arrow.startX = mx; arrow.startY = my;

    if (hasFrame('atlas_units','arrow_smear_1',scene)) {
      arrow.__trailEv = scene.time.addEvent({
        delay: 40, loop: true, callback: ()=>{
          if(!arrow.active) return;
          const smear = scene.add.image(arrow.x, arrow.y, 'atlas_units',
                         Math.random()<0.5 ? 'arrow_smear_1' : 'arrow_smear_2')
            .setRotation(arrow.rotation).setDepth(5).setAlpha(0.85);
          scene.tweens.add({ targets: smear, alpha:0, scaleX:0.3, scaleY:0.3, duration:260, onComplete:()=>smear.destroy() });
        }
      });
    } else {
      arrow.__trailEv = attachTrail(scene, arrow, 0xffe29a, 0.9, 1.6, 0.7, 320);
    }

    const dx=e.x - mx, dy=e.y - my, L = Math.hypot(dx,dy)||1;
    arrow.setVelocity((dx/L)*ARROW_SPEED,(dy/L)*ARROW_SPEED);
    const ttl = Math.ceil((L / ARROW_SPEED) * 1000) + 450;
    scene.time.delayedCall(ttl, ()=>{ stopTrail(arrow); arrow.destroy(); });
  }

  // --- эффекты и утилиты ---
  function attachTrail(scene, sprite, color, alpha=0.9, sx=1.6, sy=0.7, life=320){
    return scene.time.addEvent({
      delay: 28, loop: true,
      callback: ()=>{
        if(!sprite.active) return;
        const t = scene.add.image(sprite.x, sprite.y, 'dot8')
          .setTint(color).setAlpha(alpha).setScale(sx, sy).setDepth(5);
        t.rotation = sprite.rotation;
        scene.tweens.add({ targets: t, alpha: 0, scaleX: 0.2, scaleY: 0.2, duration: life, onComplete:()=>t.destroy() });
      }
    });
  }
  function stopTrail(sprite){
    if(sprite && sprite.__trailEv){ sprite.__trailEv.remove(); sprite.__trailEv=null; }
  }
  function cleanupProjectile(b){
    if(!b) return;
    stopTrail(b);
    if (b.__glowFollow){ b.__glowFollow.remove(); b.__glowFollow = null; }
    if (b.__glow && b.__glow.destroy){ b.__glow.destroy(); b.__glow = null; }
    if (b.active) b.destroy();
  }

  function explodeSplash(scene, x, y, baseDmg, R){
    if (scene.textures.exists('atlas_units') && scene.textures.get('atlas_units').get('explosion_0')) {
      const frames=[]; let i=0;
      while (scene.textures.get('atlas_units').has('explosion_'+i)) {
        frames.push({ key:'atlas_units', frame:'explosion_'+i }); i++;
      }
      const boom = scene.add.sprite(x, y, 'atlas_units', 'explosion_0').setDepth(7);
      const key = 'boom_once';
      if (!scene.anims.exists(key)) {
        scene.anims.create({ key, frames, frameRate: 28, repeat: 0, hideOnComplete: true });
      }
      boom.play(key);
    } else {
      const ring = scene.add.graphics().setDepth(7);
      const steps = 10, dur = 220; let i=0;
      const ev = scene.time.addEvent({
        delay: dur/steps, repeat: steps,
        callback: ()=>{
          i++; const r = 10 + (R-10)*(i/steps);
          ring.clear(); ring.lineStyle(3, 0xffb38f, 0.85).strokeCircle(x,y,r);
          if(i===steps){ ring.destroy(); ev.remove(); }
        }
      });
      for(let k=0;k<10;k++){
        const ang = Math.random()*Math.PI*2, d = 6 + Math.random()*R*0.6;
        const dot = scene.add.image(x, y,'dot8').setTint(0xffd2b6).setAlpha(0.95).setDepth(7);
        scene.tweens.add({ targets: dot, x: x+Math.cos(ang)*d, y: y+Math.sin(ang)*d, alpha: 0,
          duration: 260 + Math.random()*120, onComplete:()=>dot.destroy() });
      }
    }

    const now = scene.time.now;
    const arr = enemies.getChildren();
    for(let i=0;i<arr.length;i++){
      const e = arr[i]; if(!e||!e.active) continue;
      const dx=e.x-x, dy=e.y-y; const dist=Math.hypot(dx,dy);
      if(dist<=R){
        const pct = 1 - (dist/R);
        const scale = SPLASH_MIN_PCT + (1 - SPLASH_MIN_PCT)*pct;
        const dmg = Math.max(1, Math.round(baseDmg * scale));
        e.hp -= dmg;
        const until = now + BURN_DURATION;
        e.burnUntil = Math.max(e.burnUntil||0, until);
        e.burnDps = BURN_DPS;
        if(e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
      }
    }
  }

  function applyBurnTick(scene){
    const now = scene.time.now;
    const damagePerTick = (BURN_DPS * BURN_TICK_MS) / 1000;
    const arr = enemies.getChildren();
    for(let i=0;i<arr.length;i++){
      const e = arr[i]; if(!e||!e.active) continue;
      if(e.burnUntil && e.burnUntil > now){
        e.hp -= damagePerTick;
        if(Math.random() < 0.35){
          const t = scene.add.image(e.x + (Math.random()*6-3), e.y + (Math.random()*6-3), 'dot8')
            .setTint(0xff9e78).setAlpha(0.9).setScale(0.9).setDepth(6);
          scene.tweens.add({ targets:t, alpha:0, y: t.y-6, duration: 280, onComplete:()=>t.destroy() });
        }
        if(e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
      }
    }
  }

  // --- enemies & waves ---
  function pickEnemyTypeForWave(wave){
    if (wave <= 3) return ENEMY_TYPES.SLIME;
    if (wave <= 6) return Math.random() < 0.7 ? ENEMY_TYPES.GOBLIN : ENEMY_TYPES.SLIME;
    if (wave <= 10){ const r=Math.random(); return r<0.4?ENEMY_TYPES.BEETLE:(r<0.8?ENEMY_TYPES.GOBLIN:ENEMY_TYPES.SLIME); }
    const r=Math.random(); return r<0.55?ENEMY_TYPES.BEETLE:(r<0.85?ENEMY_TYPES.GOBLIN:ENEMY_TYPES.SLIME);
  }

  function spawnEnemy(scene,hpBase){
    const first=pathPts[0];
    const blueprint = pickEnemyTypeForWave(wave);

    // НОВОЕ: тянем idle-кадры из atlas_enemies
    const hasIdle = scene.textures.exists('atlas_enemies') &&
                    scene.textures.get('atlas_enemies').get(blueprint.key + '_idle_0') &&
                    scene.textures.get('atlas_enemies').get(blueprint.key + '_idle_1');

    let e;
    if (hasIdle) {
      const idleKey = blueprint.key + '_idle';
      if (!scene.anims.exists(idleKey)) {
        scene.anims.create({
          key: idleKey,
          frames: [
            { key:'atlas_enemies', frame: blueprint.key + '_idle_0' },
            { key:'atlas_enemies', frame: blueprint.key + '_idle_1' }
          ],
          frameRate: 4,
          repeat: -1
        });
      }
      e = scene.physics.add.sprite(first.x, first.y, 'atlas_enemies', blueprint.key + '_idle_0').setDepth(1);
      e.play(idleKey);
    } else {
      // безопасный фолбэк
      const fallbackKey =
        blueprint.key==='slime'  ? 'enemy_slime'  :
        blueprint.key==='goblin' ? 'enemy_goblin' : 'enemy_beetle';
      e = scene.physics.add.image(first.x, first.y, fallbackKey).setDepth(1);
    }

    e.setDisplaySize(blueprint.size, blueprint.size);
    const r = e.displayWidth/2;
    if (e.body.setCircle) {
      e.body.setCircle(r); e.body.setOffset(e.width/2 - r, e.height/2 - r);
    }

    e.hp = Math.round(hpBase * blueprint.hpMul);
    e.goldReward = blueprint.gold;
    e.speed = blueprint.speed + wave*4*0.25;
    e.way=0;

    enemies.add(e);
    advance(scene,e);
  }

  function advance(scene,e){
    e.way++;
    if(e.way>=pathPts.length){ hp--; updateHud(); e.destroy(); if(hp<=0) return gameOver(scene); return; }
    const p=pathPts[e.way];
    scene.physics.moveTo(e,p.x,p.y,e.speed);
    const h=scene.time.addEvent({delay:100,loop:true,callback:()=>{
      if(!e.active){ h.remove(); return; }
      const dx=e.x-p.x, dy=e.y-p.y;
      if(dx*dx+dy*dy<10*10){ e.body.reset(p.x,p.y); h.remove(); advance(scene,e); }
    }});
  }

  function nextWave(){
    const s=game.scene.keys.default;
    wave++; updateHud();
    document.getElementById('start').textContent='🔄 Spawning'; spawning=true;
    const count = 8 + Math.floor(wave * 1.6);
    const hpBase = 18 + wave * 6;
    for(let i=0;i<count;i++) s.time.delayedCall(480*i,()=>spawnEnemy(s,hpBase));
    s.time.delayedCall(480*count+200,()=>{ spawning=false; document.getElementById('start').textContent='▶️ Next'; running=true; });
  }

  // --- hud & over ---
  function updateHud(){ goldEl.textContent=gold; hpEl.textContent=hp; waveEl.textContent=wave; }
  function gameOver(scene){
    scene.add.rectangle(W/2,H/2,W,H,0x000000,0.5).setDepth(10);
    scene.add.text(W/2,H/2-10,'Game Over',{font:'20px system-ui',color:'#fff'}).setOrigin(0.5).setDepth(10);
    scene.add.text(W/2,H/2+20,'Tap to restart',{font:'14px system-ui',color:'#ddd'}).setOrigin(0.5).setDepth(10);
    scene.input.once('pointerdown',()=>location.reload());
  }
})();
</script>
