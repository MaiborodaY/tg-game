<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>TG TD • Solid</title>
  <style>
    html,body{margin:0;background:#0b0b10;color:#fff;font-family:system-ui,Segoe UI,Arial}
    #hud{position:fixed;left:8px;top:8px;display:flex;gap:12px;align-items:center;z-index:2}
    .pill{background:#1d1d2b;border:1px solid #34344a;border-radius:10px;padding:6px 10px}
    .btn{cursor:pointer;user-select:none}
    .btn.sel{outline:2px solid #7cf7d4}
    canvas{touch-action:manipulation}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="hud">
    <div class="pill">💰 <span id="gold">100</span></div>
    <div class="pill">❤️ <span id="hp">20</span></div>
    <div class="pill">🌊 <span id="wave">0</span></div>
    <div id="start" class="pill btn">▶️ Start</div>
    <div id="sell"  class="pill btn">💱 Sell</div>

    <div id="t-archer" class="pill btn sel">🏹 Archer (50)</div>
    <div id="t-mage"   class="pill btn">🔥 Mage (70)</div>
  </div>

<script>
(() => {
  const CELL=40, COLS=9, ROWS=16, W=COLS*CELL, H=ROWS*CELL;

  const game=new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H, backgroundColor:'#0b0b10',
    pixelArt:true, antialias:false,
    scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
    physics:{default:'arcade',arcade:{debug:false}},
    scene:{preload,create,update}
  });

  // --- state ---
  let grid, pathPts=[];
  let enemies, bullets;
  let towers=[], selectedTower=null;
  let gold=100, hp=20, wave=0, running=false, spawning=false;

  // константы фаербола
  const FIREBALL_SPEED = 280;      // px/s
  const SPLASH_R = 56;             // радиус взрыва
  const SPLASH_MIN_PCT = 0.4;      // урон на краю (40% от базового)

  const TOWER_TYPES = {
    ARCHER: { key:'ARCHER', cost:50, range:CELL*3.2, rate:420, dmg:10, baseKey:'archerBase', barrelLen:16, proj:'arrow' },
    MAGE:   { key:'MAGE',   cost:70, range:CELL*3.2, rate:520, dmg:14, baseKey:'mageBase',   barrelLen:18, proj:'fireball' }
  };
  let currentType = TOWER_TYPES.ARCHER;

  // HUD
  const goldEl=document.getElementById('gold');
  const hpEl=document.getElementById('hp');
  const waveEl=document.getElementById('wave');
  const startBtn=document.getElementById('start');
  const sellBtn=document.getElementById('sell');
  const archerBtn=document.getElementById('t-archer');
  const mageBtn=document.getElementById('t-mage');

  startBtn.onclick=()=>{ if(!running){running=true; nextWave();} else if(!spawning){ nextWave(); } };
  sellBtn.onclick=()=>{ if(selectedTower) sellTower(selectedTower); };
  archerBtn.onclick=()=>{ currentType=TOWER_TYPES.ARCHER; archerBtn.classList.add('sel'); mageBtn.classList.remove('sel'); };
  mageBtn.onclick  =()=>{ currentType=TOWER_TYPES.MAGE;   mageBtn.classList.add('sel');   archerBtn.classList.remove('sel'); };

  function preload(){
    // базовые текстуры
    safeRemove(this,'px'); let g=this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xffffff,1); g.fillRect(0,0,2,2); g.generateTexture('px',2,2);

    safeRemove(this,'dot8'); g=this.make.graphics({x:0,y:0,add:false});
    g.fillStyle(0xffffff,1); g.fillCircle(4,4,4); g.generateTexture('dot8',8,8);

    // стрела 32×8
    safeRemove(this,'arrow'); const a=this.make.graphics({x:0,y:0,add:false});
    a.fillStyle(0xc7a865,1); a.fillRect(4,3,20,2);
    a.fillStyle(0xffffff,1); a.fillTriangle(24,2,32,4,24,6);
    a.fillStyle(0xdac07a,1); a.fillRect(0,2,4,4);
    a.generateTexture('arrow',32,8);

    // fireball 12×12 (ядро + ореол)
    safeRemove(this,'fireball'); const f=this.make.graphics({x:0,y:0,add:false});
    f.fillStyle(0xff7a59,1); f.fillCircle(6,6,5);
    f.fillStyle(0xffb38f,0.9); f.fillCircle(6,6,3);
    f.generateTexture('fireball',12,12);

    // tower bases
    safeRemove(this,'archerBase'); const A=this.make.graphics({x:0,y:0,add:false});
    drawTowerBase(A, 0x5be0c8, 0x2c6a5f);
    A.lineStyle(2,0xead29e,1); A.strokeCircle(16,16,8);
    A.lineStyle(2,0xffffff,1); A.beginPath(); A.moveTo(9,12); A.lineTo(9,20); A.strokePath();
    A.generateTexture('archerBase',32,32);

    safeRemove(this,'mageBase'); const M=this.make.graphics({x:0,y:0,add:false});
    drawTowerBase(M, 0x8f6cff, 0x453a7a);
    M.fillStyle(0xffb38f,1); M.fillTriangle(16,8, 20,20, 12,20);
    M.fillStyle(0xff7a59,1); M.fillTriangle(16,10, 18,20, 14,20);
    M.generateTexture('mageBase',32,32);

    // enemy
    safeRemove(this,'enemy1'); const E=this.make.graphics({x:0,y:0,add:false});
    E.fillStyle(0xff7aa8,1); E.fillRoundedRect(2,6,20,14,8);
    E.fillStyle(0xff5f93,1); E.fillRoundedRect(3,7,18,6,6);
    E.fillStyle(0x2a0d1a,1); E.fillCircle(9,14,2); E.fillCircle(15,14,2);
    E.generateTexture('enemy1',24,24);
  }

  function drawTowerBase(g, color, shadow){
    g.fillStyle(shadow,1); g.fillCircle(16,18,12);
    g.fillStyle(color,1); g.fillCircle(16,16,12);
    g.fillStyle(0x0b0b10,0.25); g.fillCircle(16,16,7);
    g.lineStyle(2,0xffffff,0.15); g.strokeCircle(16,16,12);
  }
  function safeRemove(scene,key){ if(scene.textures.exists(key)) scene.textures.remove(key); }

  function create(){
    const s=this;

    // сетка + путь
    grid=Array.from({length:ROWS}, _=> Array.from({length:COLS}, _=> 0));
    const LEFT=1, RIGHT=COLS-2; let dir=1;
    function markPath(r,c){ grid[r][c]=1; pathPts.push({r,c,x:c*CELL+CELL/2,y:r*CELL+CELL/2}); }
    for(let r=0;r<ROWS-1;r+=2){
      if(dir===1){ for(let c=LEFT;c<=RIGHT;c++) markPath(r,c); markPath(r+1,RIGHT); }
      else       { for(let c=RIGHT;c>=LEFT;c--) markPath(r,c); markPath(r+1,LEFT); }
      dir*=-1;
    }

    // фон/сетка/дорога
    const g=s.add.graphics(); g.lineStyle(1,'#23233a',1);
    for(let r=0;r<=ROWS;r++) g.lineBetween(0,r*CELL,W,r*CELL);
    for(let c=0;c<=COLS;c++) g.lineBetween(c*CELL,0,c*CELL,H);
    for(const p of pathPts){ g.fillStyle(0x1a1a2a,1); g.fillRect(p.c*CELL+2,p.r*CELL+2,CELL-4,CELL-4); }

    // группы
    enemies = s.physics.add.group({ classType: Phaser.Physics.Arcade.Image, runChildUpdate:false });
    bullets = s.physics.add.group({ classType: Phaser.Physics.Arcade.Image, runChildUpdate:false });

    // попадания
    s.physics.add.overlap(bullets, enemies, (b,e)=>{
      if(!b.active || !e.active) return;

      // общий "arming-delay" для снарядов (пусть пролетят немного)
      if (b.birthTime != null) {
        const now = s.time.now, born = b.birthTime;
        const dx = (b.x - (b.startX ?? b.x)), dy = (b.y - (b.startY ?? b.y));
        if (now - born < 110 || (dx*dx+dy*dy) < 8*8) return;
      }

      // разная обработка
      const key = b.texture?.key;
      if (key === 'fireball') {
        // взрыв со сплэшем и фэллофом
        explodeSplash(s, b.x, b.y, b.dmg, SPLASH_R);
        stopTrail(b);
        b.destroy();
        return;
      }

      // обычная стрела
      e.hp -= b.dmg;
      stopTrail(b);
      b.destroy();
      if(e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
    });

    // ввод
    s.input.on('pointerdown', (p)=>{
      const w=p.positionToCamera(s.cameras.main);
      const c=Math.floor(w.x/CELL), r=Math.floor(w.y/CELL);
      if(c<0||r<0||c>=COLS||r>=ROWS) return;
      const isTower=towers.find(t=>t.c===c&&t.r===r);
      if(isTower){ selectTower(isTower); return; }
      if(grid[r][c]===0) placeTower(s,r,c, currentType);
    });

    updateHud();
  }

  function update(time,dt){
    for(const t of towers){
      t.cd-=dt;
      if(t.cd<=0){
        const e = acquireTarget(t);
        if(e){ shoot(this,t,e); t.cd=t.rate; } else { t.cd=100; }
      }
      // поворот ствола к ближайшей цели
      if(t.barrel){
        const aim = acquireTarget(t);
        if(aim){
          const ang = Phaser.Math.Angle.Between(t.x, t.y, aim.x, aim.y);
          t.barrel.rotation = Phaser.Math.Angle.RotateTo(t.barrel.rotation||0, ang, 0.15);
        }
      }
    }
    if(running && !spawning && enemies.countActive(true)===0){
      running=false;
      document.getElementById('start').textContent='▶️ Next';
    }
  }

  // --- towers ---
  function placeTower(scene,r,c,type){
    const cost=type.cost; if(gold<cost) return; gold-=cost; updateHud();
    const x=c*CELL+CELL/2,y=r*CELL+CELL/2;

    const base=scene.add.image(x,y,type.baseKey).setDepth(3);
    const barrel=scene.add.image(x,y,'px')
      .setTint(0xffffff)
      .setDisplaySize(type.barrelLen||16,4)
      .setOrigin(0.1,0.5)
      .setAlpha(0.9)
      .setDepth(4);

    const ring=scene.add.graphics().setDepth(2);
    ring.lineStyle(1, 0xffffff, 0.25).strokeCircle(x,y,type.range);

    const t={ type: type.key, proj:type.proj, r,c,x,y, node:base, barrel, ring,
      range:type.range, rate:type.rate, cd:200, dmg:type.dmg };
    towers.push(t); grid[r][c]=2; selectTower(t);
  }

  function selectTower(t){
    if(selectedTower && selectedTower.ring)
      selectedTower.ring.clear().strokeCircle(selectedTower.x,selectedTower.y,selectedTower.range);
    selectedTower=t;
  }

  function sellTower(t){
    const cfg = TOWER_TYPES[t.type] || TOWER_TYPES.ARCHER;
    gold += Math.floor((cfg.cost||50)*0.5); updateHud();
    t.node.destroy(); t.ring.destroy(); if(t.barrel) t.barrel.destroy();
    towers=towers.filter(x=>x!==t); grid[t.r][t.c]=0; selectedTower=null;
  }

  function acquireTarget(t){
    const arr=enemies.getChildren();
    let best=null, bestD2=Infinity;
    for(let i=0;i<arr.length;i++){
      const e=arr[i]; if(!e||!e.active) continue;
      const dx=e.x-t.x, dy=e.y-t.y, d2=dx*dx+dy*dy;
      if(d2<=t.range*t.range && d2<bestD2){ bestD2=d2; best=e; }
    }
    return best;
  }

  // --- выстрелы ---
  function shoot(scene,t,e){
    const a = Phaser.Math.Angle.Between(t.x, t.y, e.x, e.y);

    if (t.proj === 'fireball') {
      // фаербол мага
      const fb = scene.physics.add.image(t.x, t.y, 'fireball')
        .setDepth(6)
        .setRotation(a);
      fb.dmg = t.dmg;
      bullets.add(fb);

      fb.birthTime = scene.time.now;
      fb.startX = t.x; fb.startY = t.y;

      fb.__trailEv = attachTrail(scene, fb, 0xffb38f, 0.8, 1.0, 0.5, 300);

      const dx = e.x - t.x, dy = e.y - t.y;
      const L  = Math.hypot(dx,dy)||1;
      fb.setVelocity((dx/L)*FIREBALL_SPEED,(dy/L)*FIREBALL_SPEED);

      const ttlMs = Math.ceil((L / FIREBALL_SPEED) * 1000) + 500;
      scene.time.delayedCall(ttlMs, ()=>{ stopTrail(fb); fb.destroy(); });
      return;
    }

    // стрела лучника
    const arrow = scene.physics.add.image(t.x, t.y, 'arrow')
      .setOrigin(0.2, 0.5)
      .setRotation(a)
      .setDepth(6);
    arrow.dmg = t.dmg;
    bullets.add(arrow);

    arrow.birthTime = scene.time.now;
    arrow.startX = t.x; arrow.startY = t.y;

    arrow.__trailEv = attachTrail(scene, arrow, 0xffe29a, 0.9, 1.6, 0.7, 320);

    const dx = e.x - t.x, dy = e.y - t.y;
    const L  = Math.hypot(dx,dy)||1;
    const ARROW_SPEED = 340;
    arrow.setVelocity((dx/L)*ARROW_SPEED,(dy/L)*ARROW_SPEED);

    const ttlMs = Math.ceil((L / ARROW_SPEED) * 1000) + 450;
    scene.time.delayedCall(ttlMs, ()=>{ stopTrail(arrow); arrow.destroy(); });
  }

  // --- эффекты ---
  function attachTrail(scene, sprite, color, alpha=0.9, sx=1.6, sy=0.7, life=320){
    return scene.time.addEvent({
      delay: 28, loop: true,
      callback: ()=>{
        if(!sprite.active) return;
        const t = scene.add.image(sprite.x, sprite.y, 'dot8')
          .setTint(color).setAlpha(alpha)
          .setScale(sx, sy)
          .setDepth(5);
        t.rotation = sprite.rotation;
        scene.tweens.add({ targets: t, alpha: 0, scaleX: 0.2, scaleY: 0.2, duration: life, onComplete:()=>t.destroy() });
      }
    });
  }
  function stopTrail(sprite){
    if(sprite && sprite.__trailEv){ sprite.__trailEv.remove(); sprite.__trailEv=null; }
  }

  // красивый сплэш: кольцо + искры, и урон с фэллофом
  function explodeSplash(scene, x, y, baseDmg, R){
    // визуал кольца
    const ring = scene.add.graphics().setDepth(7);
    const steps = 10, dur = 220;
    let i=0;
    const ev = scene.time.addEvent({
      delay: dur/steps, repeat: steps,
      callback: ()=>{
        i++;
        const r = 10 + (R-10)*(i/steps);
        ring.clear();
        ring.lineStyle(3, 0xffb38f, 0.85).strokeCircle(x,y,r);
        if(i===steps){ ring.destroy(); ev.remove(); }
      }
    });
    // искры
    for(let k=0;k<10;k++){
      const ang = Math.random()*Math.PI*2;
      const d = 6 + Math.random()*R*0.6;
      const dot = scene.add.image(x, y,'dot8').setTint(0xffd2b6).setAlpha(0.95).setDepth(7);
      scene.tweens.add({
        targets: dot, x: x+Math.cos(ang)*d, y: y+Math.sin(ang)*d, alpha: 0,
        duration: 260 + Math.random()*120, onComplete:()=>dot.destroy()
      });
    }

    // урон врагам по радиусу с фэллофом
    const arr = enemies.getChildren();
    for(let i=0;i<arr.length;i++){
      const e = arr[i]; if(!e||!e.active) continue;
      const dx=e.x-x, dy=e.y-y; const dist=Math.hypot(dx,dy);
      if(dist<=R){
        const pct = 1 - (dist/R); // 1 в центре, 0 на краю
        const scale = SPLASH_MIN_PCT + (1 - SPLASH_MIN_PCT)*pct;
        const dmg = Math.max(1, Math.round(baseDmg * scale));
        e.hp -= dmg;
        if(e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
      }
    }
  }

  // --- enemies & waves ---
  function spawnEnemy(scene,hpBase){
    const first=pathPts[0];
    const e=scene.physics.add.image(first.x,first.y,'enemy1').setDepth(1);
    e.setDisplaySize(20,20);
    const r = e.displayWidth/2;
    e.body.setCircle(r);
    e.body.setOffset(e.width/2 - r, e.height/2 - r);
    e.hp=hpBase; e.way=0;
    enemies.add(e);
    advance(scene,e);
  }
  function advance(scene,e){
    e.way++;
    if(e.way>=pathPts.length){ hp--; updateHud(); e.destroy(); if(hp<=0) return gameOver(scene); return; }
    const p=pathPts[e.way];
    scene.physics.moveTo(e,p.x,p.y,45+wave*4);
    const h=scene.time.addEvent({delay:100,loop:true,callback:()=>{
      if(!e.active){ h.remove(); return; }
      const dx=e.x-p.x, dy=e.y-p.y;
      if(dx*dx+dy*dy<10*10){ e.body.reset(p.x,p.y); h.remove(); advance(scene,e); }
    }});
  }
  function nextWave(){
    const s=game.scene.keys.default;
    wave++; updateHud();
    document.getElementById('start').textContent='🔄 Spawning'; spawning=true;
    const count=8+Math.floor(wave*1.6), hpBase=24+wave*7;
    for(let i=0;i<count;i++) s.time.delayedCall(480*i,()=>spawnEnemy(s,hpBase));
    s.time.delayedCall(480*count+200,()=>{ spawning=false; document.getElementById('start').textContent='▶️ Next'; running=true; });
  }

  // --- hud & over ---
  function updateHud(){ goldEl.textContent=gold; hpEl.textContent=hp; waveEl.textContent=wave; }
  function gameOver(scene){
    scene.add.rectangle(W/2,H/2,W,H,0x000000,0.5).setDepth(10);
    scene.add.text(W/2,H/2-10,'Game Over',{font:'20px system-ui',color:'#fff'}).setOrigin(0.5).setDepth(10);
    scene.add.text(W/2,H/2+20,'Tap to restart',{font:'14px system-ui',color:'#ddd'}).setOrigin(0.5).setDepth(10);
    scene.input.once('pointerdown',()=>location.reload());
  }
})();
</script>
</body>
</html>
