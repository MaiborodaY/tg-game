<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>TG TD • Slice</title>
  <style>
    html,body{margin:0;background:#0b0b10;color:#fff;font-family:system-ui,Segoe UI,Arial}
    #hud{position:fixed;left:8px;top:8px;display:flex;gap:12px;align-items:center}
    .pill{background:#1d1d2b;border:1px solid #34344a;border-radius:10px;padding:6px 10px}
    .btn{cursor:pointer;user-select:none}
    canvas{touch-action:manipulation}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="hud">
    <div class="pill">💰 <span id="gold">100</span></div>
    <div class="pill">❤️ <span id="hp">20</span></div>
    <div class="pill">🌊 <span id="wave">0</span></div>
    <div id="start" class="pill btn">▶️ Start</div>
    <div id="sell" class="pill btn">💱 Sell</div>
  </div>

<script>
(() => {
  const CELL = 40;
  const COLS = 9, ROWS = 16;
  const W = COLS*CELL, H = ROWS*CELL;

  const config = {
    type: Phaser.CANVAS,
    width: W, height: H,
    backgroundColor: '#0b0b10',
    parent: document.body,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload, create, update }
  };

  let game = new Phaser.Game(config);

  // State
  let grid; // 0 empty, 1 path, 2 tower
  let pathCells = []; // [{c,r, x,y}]
  let towers = [];
  let enemies;
  let bullets;
  let gold = 100, hp = 20, wave = 0, running = false, spawning = false;
  let selectedTower = null;

  // UI dom
  const goldEl = document.getElementById('gold');
  const hpEl = document.getElementById('hp');
  const waveEl = document.getElementById('wave');
  const startBtn = document.getElementById('start');
  const sellBtn = document.getElementById('sell');

  startBtn.onclick = () => { if (!running) { running = true; nextWave(); } else if (!spawning) { nextWave(); } };
  sellBtn.onclick = () => { if (selectedTower) sellTower(selectedTower); };

  function preload(){}

  function create(){
    const s = this;

// build grid + NARROW snake path that leaves buildable rows
grid = Array.from({length:ROWS}, _=> Array.from({length:COLS}, _=> 0));

function markPath(r,c){
  grid[r][c] = 1;
  pathCells.push({ r, c, x:c*CELL+CELL/2, y:r*CELL+CELL/2 });
}

// Делаем змейку только по каждому ВТОРОМУ ряду,
// и держим путь внутри рамки 1..COLS-2, чтобы по краям было место под башни.
const LEFT = 1, RIGHT = COLS - 2;
let dir = 1; // 1 → вправо, -1 → влево
for (let r = 0; r < ROWS - 1; r += 2) {
  if (dir === 1) {
    for (let c = LEFT; c <= RIGHT; c++) markPath(r, c);   // горизонталь вправо
    markPath(r + 1, RIGHT);                                // спуск на 1 клетку
  } else {
    for (let c = RIGHT; c >= LEFT; c--) markPath(r, c);    // горизонталь влево
    markPath(r + 1, LEFT);                                 // спуск на 1 клетку
  }
  dir *= -1;
}


    // draw board
    const g = s.add.graphics();
    g.lineStyle(1,'#23233a',1);
    for(let r=0;r<=ROWS;r++){ g.lineBetween(0,r*CELL,W,r*CELL); }
    for(let c=0;c<=COLS;c++){ g.lineBetween(c*CELL,0,c*CELL,H); }
    // path
    for (const p of pathCells){
      g.fillStyle(0x1a1a2a,1);
      g.fillRect(p.c*CELL+2, p.r*CELL+2, CELL-4, CELL-4);
    }

    enemies = s.physics.add.group();
    bullets = s.physics.add.group();

    // input
    s.input.on('pointerdown', (pointer)=>{
      const world = pointer.positionToCamera(s.cameras.main);
      const c = Math.floor(world.x/CELL), r = Math.floor(world.y/CELL);
      if (c<0||r<0||c>=COLS||r>=ROWS) return;
      const tile = grid[r][c];

      // tap on tower => select
      const t = towers.find(t=>t.r===r && t.c===c);
      if (t){ selectTower(t); return; }

      // place
      if (tile===0) placeTower(s, r, c);
    });

    // overlaps
    s.physics.add.overlap(bullets, enemies, (b,e)=>{
      e.hp -= b.dmg; b.destroy();
      if (e.hp<=0){ e.destroy(); gold+=5; updateHud(); }
    });

    updateHud();
  }

  function update(time, delta){
    // towers -> shoot
    for (const t of towers){
      t.cooldown -= delta;
      if (t.cooldown<=0){
        const target = findTarget(t);
        if (target){
          shoot(this, t, target);
          t.cooldown = t.rate;
        }
      }
    }
    // end wave?
    if (running && !spawning && enemies.countActive(true)===0){
      running = false;
      startBtn.textContent = '▶️ Next';
    }
  }

  // Helpers
  function cellCenter(r,c){ return {x:c*CELL+CELL/2, y:r*CELL+CELL/2}; }

  function placeTower(scene, r, c){
    const cost = 50;
    if (gold<cost) return;
    gold -= cost; updateHud();

    const {x,y} = cellCenter(r,c);
    const g = scene.add.graphics();
    g.fillStyle(0x7cf7d4,1);
    g.fillCircle(x,y,14);
    g.lineStyle(2,0x0b0b10,1); g.strokeCircle(x,y,16);
    g.setDepth(5);

    const t = {
  r, c, x, y, node: g,
  range: CELL * 4.0,   // было 2.5 — теперь достаёт до дороги
  rate: 450,           // перезарядка
  cooldown: 200,
  dmg: 10
};

    towers.push(t);
    grid[r][c]=2;
    selectTower(t);
  }

  function selectTower(t){
    // clear prev
    if (selectedTower && selectedTower.ring){ selectedTower.ring.destroy(); }
    selectedTower = t;
    // draw range ring
    const s = game.scene.keys.default;
    const ring = s.add.graphics();
    ring.lineStyle(1,0x7cf7d4,0.35);
    ring.strokeCircle(t.x, t.y, t.range);
    ring.setDepth(1);
    t.ring = ring;
  }

  function sellTower(t){
    // return half cost
    gold += 25; updateHud();
    t.node.destroy();
    if (t.ring) t.ring.destroy();
    towers = towers.filter(x=>x!==t);
    grid[t.r][t.c]=0;
    selectedTower = null;
  }

  function findTarget(t){
    // nearest enemy in range
    let best = null, bestD2 = Infinity;
    enemies.children.each((e)=>{
      if (!e.active) return;
      const dx=e.x-t.x, dy=e.y-t.y;
      const d2 = dx*dx+dy*dy;
      if (d2<=t.range*t.range && d2<bestD2){
        bestD2=d2; best=e;
      }
    });
    return best;
  }

  function shoot(scene, t, e){
    const b = scene.add.rectangle(t.x, t.y, 4, 4, 0xffd45c);
    scene.physics.add.existing(b);
    const vx = e.x - t.x, vy = e.y - t.y;
    const len = Math.hypot(vx,vy)||1;
    b.body.setVelocity((vx/len)*260, (vy/len)*260);
    b.dmg = t.dmg;
    bullets.add(b);
    scene.time.delayedCall(1500, ()=> b.destroy());
  }

  function spawnEnemy(scene, hp){
    const first = pathCells[0];
    const e = scene.add.circle(first.x, first.y, 10, 0xff7aa8);
    scene.physics.add.existing(e);
    e.body.setCircle(10);               // круг вместо прямоугольника
    e.body.setOffset(-10, -10);         // центрируем круг
    e.hp = hp;
    e.step = 0;

    enemies.add(e);
    moveToNext(scene, e);
  }

  function moveToNext(scene, e){
    e.step++;
    if (e.step >= pathCells.length){
      // reached end
      hp--; updateHud(); e.destroy();
      if (hp<=0) gameOver(scene);
      return;
    }
    const p = pathCells[e.step];
    scene.physics.moveTo(e, p.x, p.y, 40 + wave*4);
    // call again when close enough
    const interval = scene.time.addEvent({
      delay: 120, callback: ()=>{
        if (!e.active){ interval.remove(); return; }
        const dx=e.x-p.x, dy=e.y-p.y;
        if (dx*dx+dy*dy < 10*10){
          e.body.reset(p.x, p.y);
          interval.remove();
          moveToNext(scene,e);
        }
      }, loop:true
    });
  }

  function nextWave(){
    const s = game.scene.keys.default;
    wave++; updateHud();
    startBtn.textContent = '🔄 Spawning';
    spawning = true;

    const count = 8 + Math.floor(wave*1.5);
    const hpBase = 20 + wave*6;

    for(let i=0;i<count;i++){
      s.time.delayedCall(500*i, ()=> spawnEnemy(s, hpBase) );
    }
    s.time.delayedCall(500*count + 200, ()=>{
      spawning=false;
      startBtn.textContent = '▶️ Next';
      running = true;
    });
  }

  function updateHud(){
    goldEl.textContent = gold;
    hpEl.textContent = hp;
    waveEl.textContent = wave;
  }

  function gameOver(scene){
    scene.add.rectangle(W/2,H/2,W,H,0x000000,0.5).setDepth(10);
    const t = scene.add.text(W/2,H/2-10,'Game Over',{font:'20px system-ui',color:'#fff'}).setOrigin(0.5).setDepth(10);
    const b = scene.add.text(W/2,H/2+20,'Tap to restart',{font:'14px system-ui',color:'#ddd'}).setOrigin(0.5).setDepth(10);
    scene.input.once('pointerdown', ()=> location.reload());
  }

})();
</script>
</body>
</html>
