<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Runner • TG HTML5</title>
  <style>
    html,body{margin:0;height:100%;background:#0b0b0f;color:#fff;font-family:system-ui,Segoe UI,Arial,sans-serif}
    #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
    #hud{position:fixed;left:12px;top:10px;font-weight:600;opacity:.95}
    #best{position:fixed;left:12px;top:34px;opacity:.75;font-size:12px}
    #hint{position:fixed;right:12px;top:10px;opacity:.65}
    #pause{position:fixed;right:10px;bottom:10px;padding:8px 10px;border-radius:10px;background:#1e1e28;color:#fff;border:1px solid #3a3a4a}
    canvas{touch-action:manipulation}
    .btn{position:fixed;left:50%;top:60%;transform:translateX(-50%);padding:10px 16px;border-radius:10px;background:#1e1e28;color:#fff;border:1px solid #3a3a4a;display:none}
    .btn2{position:fixed;left:50%;top:70%;transform:translateX(-50%);padding:8px 12px;border-radius:10px;background:#1e1e28;color:#fff;border:1px solid #3a3a4a;display:none;font-size:14px}
  </style>
  <script src="https://telegram.org/js/games.js"></script>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>
  <div id="hud">Score: <span id="sc">0</span></div>
  <div id="best">Best: <span id="bs">0</span></div>
  <div id="hint">Tap to jump (×2) • Pause: ⏸</div>
  <button id="restart" class="btn">↻ Play again</button>
  <button id="share" class="btn2">Share score</button>
  <button id="pause">⏸</button>

  <script>
  // ===== Canvas / HiDPI =====
  const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
  function resize(){
    const w = Math.min(innerWidth, 480), h = Math.min(innerHeight, 900);
    cvs.width = w * DPR; cvs.height = h * DPR; cvs.style.width = w+'px'; cvs.style.height = h+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize', resize); resize();

  // ===== Constants (смягчённые) =====
  const GROUND_Y     = () => Math.round(cvs.height/DPR - 100);
  const GRAVITY      = 0.75;
  const JUMP_VY      = -12.5;
  const BASE_SPEED   = 3.2;   // было 4.1
  const SPEED_CAP    = 7.5;   // было ~9.8
  const SPEED_GROWTH = 0.00045; // было 0.00075
  const SCORE_PER_MS = 0.0105; // чуть мягче
  const COIN_SCORE   = 15;

  // интервалы и «дыхание» сложности (ослаблено)
  const OBST_BASE_MIN = 900, OBST_BASE_MAX = 1500; // было 750–1300
  const COIN_BASE_MIN = 750, COIN_BASE_MAX = 1200; // было 650–1100
  const SIN_PERIOD_MS = 10000;   // длиннее период
  const SIN_INTENSITY = 0.20;    // амплитуда 20% вместо 35%
  const SAFE_MIN = 650, SAFE_MAX = 800; // fair-спавн

  const SHIELD_CHANCE = 0.22;

  // ===== State =====
  let running=false, paused=false, gameOver=false, sentScore=false;
  let speed=BASE_SPEED, last=performance.now(), tStart=last;
  let score=0, best=Number(localStorage.getItem('bestScore')||0);
  let safeSpawnUntil = 0;
  let countdownActive = false, countdownPhase = 3, countdownT0 = 0;

  const hud = document.getElementById('sc');
  const bestEl = document.getElementById('bs'); bestEl.textContent = best;
  const btn = document.getElementById('restart');
  const btnShare = document.getElementById('share');
  const btnPause = document.getElementById('pause');

  const player = { x: 60, y: 0, vy:0, w: 28, h: 28, onGround:false, jumpsLeft:2, shield:false, shieldBlink:0, lastVy:0 };
  let obst = [], coins = [], powerups = [], particles = [];
  let nextSpawnAt = 0, nextCoinAt = 0;

  // Parallax layers
  const layers = { back:{speed:0.2,stars:[]}, mid:{speed:0.5,stars:[]}, front:{speed:0.9,clouds:[]} };

  // payload из ?p=
  function getPayload(){ const p=new URL(location.href).searchParams.get('p'); try{ return p?JSON.parse(atob(p)):{} }catch{ return {} } }
  const payload = getPayload();

  // ===== WebAudio (синт) =====
  let AC=null;
  function ensureAudio(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch{} }
  function beepCoin(){ if(!AC) return; const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.08); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.14); }
  function thumpHit(){ if(!AC) return; const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type='triangle'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(60,t+0.12); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.35,t+0.03); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18); o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.2); }
  function shhhShield(){ if(!AC) return; const t=AC.currentTime,buf=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate),d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*4); const src=AC.createBufferSource(); src.buffer=buf; const g=AC.createGain(); g.gain.value=0.25; src.connect(g).connect(AC.destination); src.start(t); }

  // ===== Helpers =====
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), rnd=(a,b)=>Math.random()*(b-a)+a, nowMs=()=>performance.now();

  function reset(){
    speed=BASE_SPEED; score=0; hud.textContent='0'; paused=false;
    obst.length=0; coins.length=0; powerups.length=0; particles.length=0;
    player.y=GROUND_Y()-player.h; player.vy=0; player.onGround=true; player.jumpsLeft=2; player.shield=false; player.shieldBlink=0;
    tStart = last = performance.now();
    nextSpawnAt = performance.now() + 1200;    // старт без спавна поближе
    nextCoinAt  = performance.now() + 1000;
    safeSpawnUntil = performance.now() + 1200; // ещё немного safety
    gameOver=false; sentScore=false; running=true;
    btn.style.display='none'; btnShare.style.display='none';
    btnPause.textContent='⏸';
    spawnParallax();

    // стартовый отсчёт
    countdownActive = true; countdownPhase = 3; countdownT0 = performance.now();

    requestAnimationFrame(loop);
  }

  // ===== Input / Pause =====
  function jump(){
    if (!AC) ensureAudio();
    if (gameOver) { reset(); return; }
    if (paused)   { togglePause(); return; }
    if (countdownActive) return; // во время отсчёта — без прыжков
    if (!running) { running=true; last=performance.now(); requestAnimationFrame(loop); return; }
    if (player.onGround || player.jumpsLeft>0) {
      player.vy = JUMP_VY; player.onGround = false; player.jumpsLeft = Math.max(0, player.jumpsLeft - 1);
    }
  }
  cvs.addEventListener('pointerdown', jump, { passive:true });
  addEventListener('keydown', e => {
    if (e.code==='Space') jump();
    if (e.code==='KeyP' || e.code==='Escape') togglePause();
  });
  document.getElementById('restart').addEventListener('click', ()=>{ if(gameOver) reset(); });
  document.getElementById('share').addEventListener('click', ()=>{ try{ if (window.TelegramGameProxy) TelegramGameProxy.shareScore(); }catch(e){} });
  document.getElementById('pause').addEventListener('click', togglePause);

  function togglePause(){
    if (gameOver || !running) return;
    if (countdownActive) return; // во время отсчёта не ставим паузу
    paused = !paused;
    document.getElementById('pause').textContent = paused ? '▶️' : '⏸';
    if (!paused) { last = performance.now(); requestAnimationFrame(loop); }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { paused=true; document.getElementById('pause').textContent='▶️'; }
    else if(!gameOver){ last=performance.now(); requestAnimationFrame(loop); }
  });

  // ===== Parallax =====
  function spawnParallax(){
    const W=cvs.width/DPR, H=cvs.height/DPR;
    layers.back.stars = Array.from({length:40}, _=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.5}));
    layers.mid.stars  = Array.from({length:30}, _=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+0.8}));
    layers.front.clouds= Array.from({length:6}, _=>({x:Math.random()*W,y:rnd(40,H-180),w:rnd(60,120),h:rnd(18,32),alpha:rnd(0.08,0.16)}));
  }
  function drawParallax(dt){
    const W=cvs.width/DPR,H=cvs.height/DPR;
    ctx.fillStyle='#0b0b0f'; ctx.fillRect(0,0,W,H);

    ctx.fillStyle='rgba(255,255,255,0.35)';
    for(const s of layers.back.stars){ s.x -= layers.back.speed*dt*0.02*speed; if (s.x < -2) s.x = W+2; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }

    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(const s of layers.mid.stars){  s.x -= layers.mid.speed*dt*0.035*speed; if (s.x < -2) s.x = W+2; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }

    for(const c of layers.front.clouds){
      c.x -= layers.front.speed*dt*0.06*speed;
      if (c.x + c.w < -10){ c.x=W+10; c.y=rnd(40,H-180); c.w=rnd(60,120); c.h=rnd(18,32); c.alpha=rnd(0.08,0.16); }
      ctx.globalAlpha=c.alpha; ctx.fillStyle='#c1d0ff'; roundRect(c.x,c.y,c.w,c.h,8,true); ctx.globalAlpha=1;
    }

    ctx.strokeStyle = '#232336'; ctx.lineWidth = 2;
    for(let i=0;i<4;i++){ ctx.beginPath(); const y = Math.round(GROUND_Y()+i*12); ctx.moveTo(0,y+0.5); ctx.lineTo(W,y+0.5); ctx.stroke(); }
    ctx.fillStyle='#2a2a3e'; ctx.fillRect(0, GROUND_Y()+4, W, 6);
  }
  function roundRect(x,y,w,h,r,fill){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); fill?ctx.fill():ctx.stroke(); }

  // ===== Спавн/сложность =====
  function effectiveSpawnWindow(baseMin, baseMax){
    const t = (nowMs() - tStart);
    const phase = Math.sin((t / SIN_PERIOD_MS) * Math.PI * 2); // -1..1
    const k = 1 - SIN_INTENSITY * phase; // 0.8..1.2
    return [baseMin*k, baseMax*k];
  }
  function markSafeWindow(){ safeSpawnUntil = Math.max(safeSpawnUntil, performance.now() + rnd(SAFE_MIN, SAFE_MAX)); }

  function spawnObstacle(){
    const now = performance.now();
    if (now < safeSpawnUntil || countdownActive) { nextSpawnAt = safeSpawnUntil || (now+400); return; }

    const h = Math.round(rnd(26, 48));
    const w = Math.round(rnd(18, 28));
    obst.push({ x: cvs.width/DPR + 10, y: GROUND_Y()-h, w, h });

    if (h >= 44 || w >= 26) markSafeWindow();

    const [mn,mx] = effectiveSpawnWindow(OBST_BASE_MIN, OBST_BASE_MAX);
    nextSpawnAt = now + rnd(mn, mx);
  }

  const PATTERNS = {
    line: (x0,y0) => Array.from({length:6},(_,i)=>({x:x0+i*18,y:y0})),
    arc:  (x0,y0) => Array.from({length:7},(_,i)=>({x:x0+i*16,y:y0 - Math.sin(i/6*Math.PI)*24})),
    stairs:(x0,y0)=> Array.from({length:6},(_,i)=>({x:x0+i*18,y:y0 - i*12})),
    wave: (x0,y0) => Array.from({length:8},(_,i)=>({x:x0+i*16,y:y0 - Math.sin(i*0.9)*22}))
  };
  const KEYS = Object.keys(PATTERNS);

  function spawnCoinPattern(){
    const now = performance.now();
    if (now < safeSpawnUntil || countdownActive) { nextCoinAt = safeSpawnUntil || (now+400); return; }

    const W=cvs.width/DPR, baseX = W + 20, baseY = GROUND_Y() - rnd(70, 150);
    const key = KEYS[(Math.random()*KEYS.length)|0];
    const pts = PATTERNS[key](baseX, baseY);
    for (const p of pts) coins.push({ x: p.x, y: p.y, r: 6, taken:false });

    if (key === 'stairs' || key === 'arc') markSafeWindow();

    if (Math.random() < SHIELD_CHANCE) powerups.push({ x: baseX + rnd(40,80), y: baseY - rnd(10,30), type:'shield', r:8 });

    const [mn,mx] = effectiveSpawnWindow(COIN_BASE_MIN, COIN_BASE_MAX);
    nextCoinAt = now + rnd(mn, mx);
  }

  // ===== Частицы =====
  function spawnDust(x,y,impact=1){ for(let i=0;i<8;i++) particles.push({ x, y, vx:rnd(-1.2,1.2), vy:rnd(-2.2,-0.8)*impact, life:rnd(260,420), clr:'rgba(200,200,255,0.6)', sz:rnd(1,2) }); }
  function spawnSparks(x,y){ for(let i=0;i<10;i++){ const a=Math.random()*Math.PI*2, sp=rnd(1.2,2.2); particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:rnd(240,420), clr:'rgba(124,247,212,0.9)', sz:rnd(1.2,2.4) }); } }
  function updateParticles(dt){ for(const p of particles){ p.x+=p.vx*(dt*0.06); p.y+=p.vy*(dt*0.06); p.vy+=0.02*(dt*0.06); p.life-=dt; } particles=particles.filter(p=>p.life>0); }
  function drawParticles(){ for(const p of particles){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life/420)); ctx.fillStyle=p.clr; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; }

  // ===== Рендер сущностей =====
  function drawPlayer(){
    ctx.save(); ctx.translate(player.x, player.y);
    const blink = player.shieldBlink > 0 ? (Math.sin(performance.now()*0.04)>0?1:0) : 0;
    ctx.fillStyle = blink ? '#ffffff' : '#7cf7d4'; ctx.fillRect(0,0, player.w, player.h);
    ctx.fillStyle='#0b0b0f'; ctx.fillRect(player.w-10, 6, 6, 6);
    if (player.shield){ ctx.strokeStyle='rgba(124,247,212,0.9)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(player.w/2, -8, 8, 0, Math.PI*2); ctx.stroke(); }
    ctx.restore();
  }
  function drawObstacles(){ ctx.fillStyle='#ff7aa8'; for(const o of obst) ctx.fillRect(o.x, o.y, o.w, o.h); }
  function drawCoins(){ ctx.fillStyle='#ffd45c'; for(const c of coins){ if(!c.taken){ ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill(); } } }
  function drawPowerups(){ for(const p of powerups){ if (p.type==='shield'){ ctx.strokeStyle='rgba(124,247,212,0.85)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(p.x,p.y,p.r-4,0,Math.PI*2); ctx.stroke(); } } }

  function drawOverlays(){
    if (gameOver || paused || countdownActive){
      ctx.textAlign='center';
      ctx.font = 'bold 22px system-ui, Arial';
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,cvs.width/DPR,cvs.height/DPR);
      ctx.fillStyle='#fff';

      if (countdownActive){
        const t = (performance.now()-countdownT0);
        const phase = Math.floor(t/1000); // 0,1,2,3,4
        let text = '';
        if (phase<=2) text = String(3-phase);
        else if (phase===3) text = 'GO!';
        else text = '';

        ctx.fillText(text, (cvs.width/DPR)/2, (cvs.height/DPR)/2 - 8);

        if (phase>=4){
          countdownActive = false;
          last = performance.now(); // сбросить dt
          // небольшое safety окно прямо после старта
          safeSpawnUntil = performance.now() + 500;
        }
      } else if (paused){
        ctx.fillText('Paused', (cvs.width/DPR)/2, (cvs.height/DPR)/2 - 24);
        ctx.font = '16px system-ui, Arial'; ctx.fillStyle='rgba(255,255,255,.85)';
        ctx.fillText('Tap or ▶️ to continue', (cvs.width/DPR)/2, (cvs.height/DPR)/2 + 4);
      } else if (gameOver){
        ctx.fillText('Game Over', (cvs.width/DPR)/2, (cvs.height/DPR)/2 - 24);
        ctx.font = '16px system-ui, Arial'; ctx.fillStyle='rgba(255,255,255,.85)';
        ctx.fillText('Tap to restart', (cvs.width/DPR)/2, (cvs.height/DPR)/2 + 4);
        btn.style.display='block'; btnShare.style.display='block';
      }
    }
  }

  // ===== Игровая логика =====
  async function endGame(){
    running=false; gameOver=true; drawOverlays();
    if (score > best) { best = Math.floor(score); localStorage.setItem('bestScore', best); bestEl.textContent = best; }
    if (sentScore) return; sentScore = true;
    try{
      const res = await fetch('/api/score', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ score: Math.floor(score), payload }) });
      const j = await res.json().catch(()=> ({})); if(!j.ok) console.log('Score send error:', j);
    }catch(e){ console.log('Score send failed:', e); }
  }

  const collideRect=(a,b)=> a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
  function collideCircleRect(c, r){ const cx=clamp(c.x,r.x,r.x+r.w), cy=clamp(c.y,r.y,r.y+r.h); const dx=c.x-cx, dy=c.y-cy; return (dx*dx+dy*dy)<=c.r*c.r; }
  const collideCircles=(a,b)=>{ const dx=a.x-b.x, dy=a.y-b.y; const r=a.r+b.r; return dx*dx+dy*dy<=r*r; };

  function loop(ts){
    requestAnimationFrame(loop);
    if(!running) return;

    // ограничим «скачок» dt (например при сворачивании) до 32мс
    let dt = ts - last; if (dt > 32) dt = 32; if (dt < 0) dt = 0; last = ts;

    // рисуем фон
    drawParallax(dt);

    // отсчёт: показываем оверлей и не обновляем физику/спавн
    if (countdownActive){
      drawCoins(); drawObstacles(); drawPowerups(); drawPlayer(); drawParticles();
      drawOverlays(); return;
    }

    // пауза
    if (paused){ drawCoins(); drawObstacles(); drawPowerups(); drawPlayer(); drawParticles(); drawOverlays(); return; }

    // рост сложности
    speed = Math.min(SPEED_CAP, speed + dt * SPEED_GROWTH);

    // физика игрока
    player.lastVy = player.vy;
    player.vy += GRAVITY;
    player.y  += player.vy;
    const gy = GROUND_Y() - player.h;
    if (player.y >= gy) {
      const impact = Math.min(1.6, Math.max(0.6, Math.abs(player.lastVy)/10));
      if (!player.onGround && player.lastVy > 3) spawnDust(player.x+player.w/2, gy+player.h, impact);
      player.y = gy; player.vy = 0; if(!player.onGround){ player.onGround = true; player.jumpsLeft = 2; }
    }
    if (player.shieldBlink>0) player.shieldBlink -= dt;

    // спавн
    if (ts >= nextSpawnAt) spawnObstacle();
    if (ts >= nextCoinAt)  spawnCoinPattern();

    // движение и очистка
    for(const o of obst){ o.x -= speed; }  obst = obst.filter(o => o.x + o.w > -10);
    for(const c of coins){ if(!c.taken) c.x -= speed*1.05; } coins = coins.filter(c => (!c.taken && c.x + c.r > -10));
    for(const p of powerups){ p.x -= speed; } powerups = powerups.filter(p => p.x + p.r > -10);
    updateParticles(dt);

    // столкновения
    for(const c of coins){ if(!c.taken && collideCircleRect(c,{x:player.x,y:player.y,w:player.w,h:player.h})){ c.taken=true; score+=COIN_SCORE; beepCoin(); } }
    for(const p of powerups){
      if (p.type==='shield' && collideCircles({x:player.x+player.w/2,y:player.y+player.h/2,r:12}, p)){
        player.shield = true; shhhShield(); spawnSparks(p.x,p.y); p.x=-9999; markSafeWindow();
      }
    }
    powerups = powerups.filter(p => p.x > -50);

    for(const o of obst){
      if (collideRect(player,o)){
        if (player.shield){
          player.shield=false; player.shieldBlink=400; thumpHit(); spawnSparks(player.x+player.w/2, player.y+player.h/2);
          player.vy=-6; player.onGround=false; o.x=-9999; markSafeWindow();
        } else { thumpHit(); endGame(); return; }
      }
    }

    // очки и отрисовка
    score += dt * SCORE_PER_MS;
    document.getElementById('sc').textContent = String(Math.floor(score));
    drawCoins(); drawObstacles(); drawPowerups(); drawPlayer(); drawParticles();
    if (gameOver) { drawOverlays(); }
  }

  // старт
  reset();
  </script>
</body>
</html>
